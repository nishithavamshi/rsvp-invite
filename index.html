<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Marriage Invitation</title>

<style>
  /* This section handles the full-screen background */
  body, html {
    margin: 0; 
    padding: 0;
    width: 100%; 
    height: 100%;
    
    /* Apply the floral background */
    background-image: url('background-image.jpg'); 
    background-size: cover;        /* Fills the entire screen */
    background-position: center;   /* Keeps the flowers centered */
    background-repeat: no-repeat;
    background-attachment: fixed;  /* Background stays still while scrolling */
    
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden; /* Prevents unwanted scrollbars */
  }

  /* The container for your invitation card */
  .container {
    max-width: 420px;
    width: 90%;
    text-align: center;
    padding: 20px;
    /* This adds a nice shadow to lift the card off the background */
    filter: drop-shadow(0 15px 30px rgba(0,0,0,0.4));
  }

  .btn {
    background-color: #d44e4e;
    color: white;
    padding: 14px 32px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 50px;
    text-decoration: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    display: inline-block;
    margin-top: 10px;
    transition: background-color 0.3s ease, transform 0.2s ease;
  }

  .btn:hover {
    background-color: #b33d3d;
    transform: scale(1.05);
  }

  img.card-photo {
    max-width: 100%;
    height: auto;
    margin-bottom: 24px;
    border-radius: 12px;
    user-select: none;
    /* Matches the warm tone of the illustration */
    border: 4px solid white; 
  }
</style>
</head>
<body>

<div class="container">
  <img src="invite-photo.jpg" alt="Invitation Photo" class="card-photo" />
  
  <br>
  
  <a href="https://nishithavamshi.github.io/rsvp-invite/rsvp.html" class="btn" aria-label="Open Invitation">
    Open Invitation 💌
  </a>
</div>

</body>
</html>
