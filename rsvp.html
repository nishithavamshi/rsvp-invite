<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RSVP</title>

<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    margin: 0;
    background: #f9f9f9;
    display: flex;
    justify-content: center;
    padding: 20px;
  }

  .container {
    width: 100%;
    max-width: 420px;
    background: white;
    padding: 24px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }

  h1 {
    text-align: center;
    margin-bottom: 8px;
  }

  .sub {
    text-align: center;
    color: gray;
    margin-bottom: 24px;
  }

  .hearts {
    display: flex;
    justify-content: space-around;
    margin-bottom: 24px;
  }

  /* HEART BOX (no circle now) */
  .heart-box {
    text-align: center;
    cursor: pointer;
    user-select: none;
    border: none;
    padding: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .heart-box:focus {
    outline: 2px solid #0078D7;
    border-radius: 8px;
  }

  /* HEART STYLE */
  .heart {
    width: 50px;
    height: 50px;
    fill: none;
    stroke: black;
    stroke-width: 2;
    transition: all 0.3s ease;
  }

  /* RED (Attending) */
  .selected.red .heart {
    fill: red;
    stroke: red;
    transform: scale(1.15);
  }

  /* BLACK (Not Attending) */
  .selected.black .heart {
    fill: black;
    stroke: black;
    transform: scale(1.15);
  }

  .heart-label {
    margin-top: 6px;
    font-weight: 600;
    font-size: 14px;
  }

  input, select, button {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
  }

  button {
    background-color: #d44;
    color: white;
    border: none;
    margin-top: 24px;
    cursor: pointer;
    font-weight: 600;
  }

  button:hover {
    background-color: #b33;
  }

  @media (max-width: 480px) {
    .heart {
      width: 40px;
      height: 40px;
    }
    .heart-label {
      font-size: 12px;
    }
  }
</style>
</head>

<body>

<div class="container">

  <h1>R.S.V.P.</h1>
  <p class="sub">Kindly respond</p>

  <form 
    action="https://formspree.io/f/mwvwpron" 
    method="POST" 
    onsubmit="return validateForm()"
  >
    <input type="hidden" name="_subject" value="Marriage RSVP" />
    <input type="hidden" name="_redirect" value="https://nishithavamshi.github.io/rsvp-site/thanks.html" />
    <input type="text" name="_gotcha" style="display:none" />

    <input type="hidden" name="attending" id="attending" required />

    <div class="hearts" role="radiogroup">

      <!-- ATTENDING -->
      <div 
        class="heart-box" 
        tabindex="0"
        onclick="selectOption('Yes')" 
        onkeydown="handleKey(event, 'Yes')"
        id="heartYesBox"
      >
        <svg class="heart" viewBox="0 0 24 24">
          <path d="M12 21s-6.7-4.35-10-9C-1.5 6.5 2.5 2 7 4.5 9 5.5 12 8 12 8s3-2.5 5-3.5C21.5 2 25.5 6.5 22 12c-3.3 4.65-10 9-10 9z"/>
        </svg>
        <div class="heart-label">ATTENDING</div>
      </div>

      <!-- NOT ATTENDING -->
      <div 
        class="heart-box" 
        tabindex="0"
        onclick="selectOption('No')" 
        onkeydown="handleKey(event, 'No')"
        id="heartNoBox"
      >
        <svg class="heart" viewBox="0 0 24 24">
          <path d="M12 21s-6.7-4.35-10-9C-1.5 6.5 2.5 2 7 4.5 9 5.5 12 8 12 8s3-2.5 5-3.5C21.5 2 25.5 6.5 22 12c-3.3 4.65-10 9-10 9z"/>
        </svg>
        <div class="heart-label">NOT ATTENDING</div>
      </div>

    </div>

    <input 
      type="text" 
      name="name" 
      placeholder="Your Name" 
      required
    />

    <input 
      type="number" 
      name="guests" 
      placeholder="No. of guests attending including you" 
      min="0" 
      max="20" 
      required
    />

    <select name="meal" required>
      <option value="" disabled selected>Meal Preference</option>
      <option>Veg</option>
      <option>Non-Veg</option>
    </select>

    <button type="submit">Submit RSVP</button>
  </form>
</div>

<script>
  function selectOption(value) {
    const attendingInput = document.getElementById('attending');
    attendingInput.value = value;

    const yesBox = document.getElementById('heartYesBox');
    const noBox = document.getElementById('heartNoBox');

    if(value === 'Yes') {
      yesBox.classList.add('selected', 'red');
      noBox.classList.remove('selected', 'black');
    } else {
      noBox.classList.add('selected', 'black');
      yesBox.classList.remove('selected', 'red');
    }
  }

  function validateForm() {
    const attendingValue = document.getElementById('attending').value;
    if (!attendingValue) {
      alert('Please select attending or not attending ❤️');
      return false;
    }
    return true;
  }

  function handleKey(event, value) {
    if(event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      selectOption(value);
    }
  }
</script>

</body>
</html>
