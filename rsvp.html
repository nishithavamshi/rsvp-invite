<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RSVP</title>

<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    margin: 0;
    background: #f9f9f9;
    display: flex;
    justify-content: center;
    padding: 20px;
  }

  .container {
    width: 100%;
    max-width: 420px;
    background: white;
    padding: 24px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }

  h1 {
    text-align: center;
    margin-bottom: 8px;
  }

  .sub {
    text-align: center;
    color: gray;
    margin-bottom: 24px;
  }

  .hearts {
    display: flex;
    justify-content: space-around;
    margin-bottom: 24px;
  }

  .heart-box {
    text-align: center;
    cursor: pointer;
    user-select: none;
    border: 2px solid black;
    border-radius: 50%;
    padding: 10px;
    width: 80px;
    height: 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: background-color 0.3s ease, border-color 0.3s ease;
  }

  .heart-box:focus {
    outline: 3px solid #0078D7;
    outline-offset: 3px;
  }

  .heart {
    font-size: 36px;
    user-select: none;
    color: transparent; /* initially transparent to show empty */
    transition: color 0.3s ease;
  }

  .selected.red .heart {
    color: red;
  }

  .selected.black .heart {
    color: black;
  }

  /* Fill background when selected */
  .selected.red {
    background-color: #ffe6e6;
    border-color: red;
  }

  .selected.black {
    background-color: #e6e6e6;
    border-color: black;
  }

  .heart-label {
    margin-top: 6px;
    font-weight: 600;
    font-size: 14px;
    color: black;
  }

  input, select, button {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
  }

  button {
    background-color: #d44;
    color: white;
    border: none;
    margin-top: 24px;
    cursor: pointer;
    font-weight: 600;
  }

  button:hover {
    background-color: #b33;
  }

  @media (max-width: 480px) {
    .heart-box {
      width: 60px;
      height: 60px;
      padding: 6px;
    }
    .heart {
      font-size: 28px;
    }
    .heart-label {
      font-size: 12px;
    }
  }
</style>
</head>

<body>

<div class="container">

  <h1>R.S.V.P.</h1>
  <p class="sub">Kindly respond</p>

  <form 
    action="https://formspree.io/f/mwvwpron" 
    method="POST" 
    onsubmit="return validateForm()"
  >
    <input type="hidden" name="_subject" value="Marriage RSVP" />
    <input type="hidden" name="_redirect" value="https://nishithavamshi.github.io/rsvp-site/thanks.html" />
    <input type="text" name="_gotcha" style="display:none" />

    <input type="hidden" name="attending" id="attending" required />

    <div class="hearts" role="radiogroup" aria-label="Will you attend?">
      <div 
        class="heart-box" 
        tabindex="0" 
        role="radio" 
        aria-checked="false" 
        aria-label="Attending"
        onclick="selectOption('Yes')" 
        onkeydown="handleKey(event, 'Yes')"
        id="heartYesBox"
      >
        <div class="heart">❤️</div>
        <div class="heart-label">ATTENDING</div>
      </div>

      <div 
        class="heart-box" 
        tabindex="0" 
        role="radio" 
        aria-checked="false" 
        aria-label="Not attending"
        onclick="selectOption('No')" 
        onkeydown="handleKey(event, 'No')"
        id="heartNoBox"
      >
        <div class="heart">❤️</div>
        <div class="heart-label">NOT ATTENDING</div>
      </div>
    </div>

    <input 
      type="text" 
      name="name" 
      placeholder="Your Name" 
      required 
      aria-label="Your Name"
      autocomplete="name"
    />

    <input 
      type="number" 
      name="guests" 
      placeholder="No. of guests attending" 
      min="1" 
      max="20" 
      required
      aria-label="Number of guests attending"
    />

    <select name="meal" required aria-label="Meal preference">
      <option value="" disabled selected>Meal Preference</option>
      <option>Veg</option>
      <option>Non-Veg</option>
    </select>

    <button type="submit">Submit RSVP</button>
  </form>
</div>

<script>
  function selectOption(value) {
    const attendingInput = document.getElementById('attending');
    attendingInput.value = value;

    const yesBox = document.getElementById('heartYesBox');
    const noBox = document.getElementById('heartNoBox');

    if(value === 'Yes') {
      yesBox.classList.add('selected', 'red');
      yesBox.setAttribute('aria-checked', 'true');
      noBox.classList.remove('selected', 'black');
      noBox.setAttribute('aria-checked', 'false');
    } else {
      noBox.classList.add('selected', 'black');
      noBox.setAttribute('aria-checked', 'true');
      yesBox.classList.remove('selected', 'red');
      yesBox.setAttribute('aria-checked', 'false');
    }
  }

  function validateForm() {
    const attendingValue = document.getElementById('attending').value;
    if (!attendingValue) {
      alert('Please select attending or not attending ❤️');
      return false;
    }
    return true;
  }

  function handleKey(event, value) {
    if(event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      selectOption(value);
    }
  }
</script>

</body>
</html>
