<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<!-- Premium Wedding Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<title>Luxury Telugu Wedding RSVP</title>

<style>
  /* BODY + BACKGROUND */
  body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background:
      radial-gradient(circle at top, rgba(255,215,0,0.25), transparent 60%),
      linear-gradient(135deg, #6b0000, #b8860b);
    display: flex;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
  }

  /* TORANAM */
  .toranam {
    position: fixed;
    top: 0;
    width: 100%;
    height: 100px;
    background: url('https://i.imgur.com/7b1YQfK.png') repeat-x center;
    background-size: contain;
    pointer-events: none;
    animation: floatT 3s ease-in-out infinite alternate;
  }

  @keyframes floatT {
    0% { transform: translateY(0px); }
    100% { transform: translateY(6px); }
  }

  /* SPARKLES */
  .sparkle {
    position: fixed;
    width: 5px;
    height: 5px;
    background: gold;
    border-radius: 50%;
    opacity: 0.8;
    animation: sparkleAnim linear infinite;
  }

  @keyframes sparkleAnim {
    0% { transform: translateY(0px) scale(1); opacity:1;}
    50% { opacity:0.4; }
    100% { transform: translateY(-600px) scale(0.5); opacity:0;}
  }

  /* CARD */
  .container {
    width: 100%;
    max-width: 480px;
    margin-top: 120px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(8px);
    padding: 28px;
    border-radius: 18px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    border: 2px solid rgba(212,175,55,0.6);
    animation: fadeIn 1.2s ease;
    position: relative;
    z-index: 10;
  }

  @keyframes fadeIn {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
  }

  h1 {
    font-family: 'Cinzel', serif;
    text-align: center;
    margin-bottom: 5px;
    color: #8b0000;
    letter-spacing: 2px;
  }

  .sub {
    text-align: center;
    color: #555;
    margin-bottom: 25px;
  }

  /* BRIDE & GROOM */
  .couple {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 25px;
  }

  .couple img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 4px solid gold;
    object-fit: cover;
    box-shadow: 0 6px 18px rgba(0,0,0,0.25);
  }

  /* HEARTS */
  .hearts {
    display: flex;
    justify-content: space-around;
    margin-bottom: 25px;
  }

  .heart-box {
    text-align: center;
    cursor: pointer;
    padding: 10px;
  }

  .heart {
    width: 50px;
    height: 50px;
    fill: none;
    stroke: #444;
    stroke-width: 2;
    transition: 0.3s;
  }

  .selected.red .heart {
    fill: #d4af37;
    stroke: #d4af37;
    transform: scale(1.2);
  }

  .selected.black .heart {
    fill: #444;
    stroke: #444;
    transform: scale(1.2);
  }

  .heart-label {
    margin-top: 6px;
    font-weight: 500;
    font-size: 13px;
  }

  input, select {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 15px;
  }

  /* BUTTON */
  button {
    width: 100%;
    padding: 14px;
    margin-top: 25px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(45deg, #b8860b, #d4af37);
    color: white;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }

  /* DIYAS */
  .diya-container {
    display: flex;
    justify-content: space-between;
    margin-top: 15px;
  }

  .diya {
    width: 30px;
    height: 50px;
    background: linear-gradient(to top, #b8860b, #ffd700);
    border-radius: 50% 50% 0 0;
    position: relative;
    animation: flicker 1.5s infinite alternate;
  }

  .diya::after {
    content: '';
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    width: 6px;
    height: 12px;
    background: radial-gradient(circle, #ffea00 0%, #ff4500 100%);
    border-radius: 50%;
  }

  @keyframes flicker {
    0% { transform: scaleY(1); opacity: 0.9; }
    50% { transform: scaleY(1.1); opacity: 1; }
    100% { transform: scaleY(0.95); opacity: 0.9; }
  }

</style>
</head>

<body>

<!-- TORANAM -->
<div class="toranam"></div>

<!-- SPARKLES -->
<script>
  for(let i=0;i<40;i++){
    let s=document.createElement('div');
    s.classList.add('sparkle');
    s.style.left=Math.random()*100+'vw';
    s.style.top=Math.random()*100+'vh';
    s.style.animationDuration=(3+Math.random()*5)+'s';
    document.body.appendChild(s);
  }
</script>

<div class="container">

  <h1>R.S.V.P.</h1>
  <p class="sub">Kindly respond with your presence</p>

  <!-- BRIDE & GROOM -->
  <div class="couple">
    <img src="https://via.placeholder.com/100?text=Bride" alt="Bride">
    <img src="https://via.placeholder.com/100?text=Groom" alt="Groom">
  </div>

  <form 
    action="https://formspree.io/f/mwvwpron" 
    method="POST" 
    onsubmit="return validateForm()"
  >
    <input type="hidden" name="attending" id="attending" required />

    <div class="hearts">
      <div class="heart-box" onclick="selectOption('Yes')" id="heartYesBox">
        <svg class="heart" viewBox="0 0 24 24">
          <path d="M12 21s-6.7-4.35-10-9C-1.5 6.5 2.5 2 7 4.5 9 5.5 12 8 12 8s3-2.5 5-3.5C21.5 2 25.5 6.5 22 12c-3.3 4.65-10 9-10 9z"/>
        </svg>
        <div class="heart-label">ATTENDING</div>
      </div>

      <div class="heart-box" onclick="selectOption('No')" id="heartNoBox">
        <svg class="heart" viewBox="0 0 24 24">
          <path d="M12 21s-6.7-4.35-10-9C-1.5 6.5 2.5 2 7 4.5 9 5.5 12 8 12 8s3-2.5 5-3.5C21.5 2 25.5 6.5 22 12c-3.3 4.65-10 9-10 9z"/>
        </svg>
        <div class="heart-label">NOT ATTENDING</div>
      </div>
    </div>

    <input type="text" name="name" placeholder="Your Name" required />
    <input type="number" name="guests" placeholder="Guests including you" min="0" max="20" required />
    <select name="meal" required>
      <option value="" disabled selected>Meal Preference</option>
      <option>Veg</option>
      <option>Non-Veg</option>
    </select>

    <button type="submit">Submit RSVP 💌</button>
  </form>

  <!-- DIYAS -->
  <div class="diya-container">
    <div class="diya"></div>
    <div class="diya"></div>
    <div class="diya"></div>
    <div class="diya"></div>
  </div>

</div>

<!-- OPTIONAL MUSIC -->
<audio autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
  function selectOption(value) {
    document.getElementById('attending').value = value;
    const yes = document.getElementById('heartYesBox');
    const no = document.getElementById('heartNoBox');
    if (value==='Yes') {
      yes.classList.add('selected','red');
      no.classList.remove('selected','black');
    } else {
      no.classList.add('selected','black');
      yes.classList.remove('selected','red');
    }
  }
  function validateForm() {
    if(!document.getElementById('attending').value){
      alert('Please select attending ❤️');
      return false;
    }
    return true;
  }
</script>

</body>
</html>
